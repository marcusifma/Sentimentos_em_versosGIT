<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carrossel Simples</title>
  <style>
    .carrossel {
      width: 500px;
      height: 300px;
      overflow: hidden;
      margin: 0 auto;
      position: relative;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .carrossel img {
      width: 100%;
      height: 100%;
      position: absolute;
      opacity: 0;
      transition: opacity 1s;
    }

    .carrossel img.active {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="carrossel">
  <img src="https://i.ibb.co/c2r7c0F/10.png://images2.imgbox.com/e0/7e/TDfkDlAX_o.png" class="active">
  <img src="https://i.ibb.co/DDgv45fW/Design-sem-nome-1-1-1.png">
  <img src="https://i.ibb.co/HpdWVbRY/9.png">
</div>

<script>
  let index = 0;
  const imagens = document.querySelectorAll('.carrossel img');

  setInterval(() => {
    imagens[index].classList.remove('active');
    index = (index + 1) % imagens.length;
    imagens[index].classList.add('active');
  }, 3000); // Troca a cada 3 segundos
</script>

</body>
</html>
